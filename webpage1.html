<html>
<head>
<title>Guru99 Bank Login Page</title>
<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f2f2f2;
}
form {
    background-color: white;
    padding: 20px;
    width: 300px;
    margin: 50px auto;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
    color: #333;
}
input[type=text], input[type=password] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}
input[type=submit] {
    width: 100%;
    background-color: #4CAF50;
    color: white;
    padding: 14px 20px;
    margin: 8px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
input[type=submit]:hover {
    background-color: #45a049;
}
label {
    font-weight: bold;
}
</style>
</head>
<body>

<form action="/action_page.php">
  <h2>Guru99 Bank Login</h2>
  
  <label for="email">Email ID:</label><br>
  <input type="text" id="email" name="email" placeholder="Enter email"><br><br>
  
  <label for="passwd">Password:</label><br>
  <input type="password" id="passwd" name="passwd" placeholder="Enter password"><br><br>
  
  <input type="submit" id="SubmitLogin" value="Sign In">
</form> 

<p style="text-align:center;">To know more about Selenium, visit the official page 
<a href ="https://www.selenium.dev/">Selenium Official Page</a> 
</p>

</body>
</html>
